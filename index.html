<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Gold Price in India (INR)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        
        :root {
            --primary: #f59e0b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e2937, #334155);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.8rem;
            color: #fcd34d;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        
        .last-updated {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 10px;
        }
        
        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #475569;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 25px -5px rgba(245, 158, 11, 0.2);
        }
        
        .purity {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fcd34d;
            margin-bottom: 8px;
        }
        
        .price {
            font-size: 2.4rem;
            font-weight: 700;
            color: white;
            margin: 12px 0;
        }
        
        .price-per {
            font-size: 1rem;
            color: #94a3b8;
        }
        
        .change {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            padding: 4px 12px;
            border-radius: 9999px;
        }
        
        .up { background: #166534; color: #4ade80; }
        .down { background: #991b1b; color: #f87171; }
        
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #64748b;
            font-size: 0.9rem;
        }
        
        button {
            background: var(--primary);
            color: #1e2937;
            border: none;
            padding: 12px 28px;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        
        button:hover {
            background: #fbbf24;
            transform: scale(1.05);
        }
        
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid #334155;
            border-top: 3px solid #fcd34d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Live Gold Rates</h1>
            <p class="subtitle">24K • 22K • 20K • 18K Gold Price in INR (India)</p>
            <div class="last-updated" id="last-updated">Last updated: Just now</div>
        </header>
        
        <div class="price-grid" id="price-grid">
            <!-- Cards will be populated by JavaScript -->
        </div>
        
        <button onclick="fetchPrices()">🔄 Refresh Prices</button>
        <div class="loader" id="loader"></div>
        
        <div class="footer">
            <p>Data is approximate. For production use, get a free API key from <a href="https://www.goldapi.io/" target="_blank" style="color:#fcd34d;">GoldAPI.io</a></p>
            <p>Made with ❤️ for GitHub</p>
        </div>
    </div>

    <script>
        // Sample data (replace with real API call)
        let prices = {
            "24k": { price: 15093, change: -278 },
            "22k": { price: 13835, change: -255 },
            "20k": { price: 12577, change: -232 },
            "18k": { price: 11320, change: -208 }
        };
        
        function formatPrice(price) {
            return price.toLocaleString('en-IN');
        }
        
        function calculateChangePercent(price, change) {
            const percent = ((change / (price - change)) * 100).toFixed(2);
            return percent;
        }
        
        function createCard(purity, data) {
            const card = document.createElement('div');
            card.className = 'card';
            const isUp = data.change > 0;
            
            card.innerHTML = `
                <div class="purity">${purity} Gold</div>
                <div class="price">₹${formatPrice(data.price)}</div>
                <div class="price-per">per gram</div>
                <div class="change ${isUp ? 'up' : 'down'}">
                    ${isUp ? '↑' : '↓'} ₹${Math.abs(data.change)} 
                    <span style="font-size:0.85rem;">(${calculateChangePercent(data.price, data.change)}%)</span>
                </div>
                <small style="color:#64748b; display:block; margin-top:12px;">Today • Market Rate</small>
            `;
            return card;
        }
        
        function renderPrices() {
            const grid = document.getElementById('price-grid');
            grid.innerHTML = '';
            
            Object.keys(prices).forEach(key => {
                const purity = key.toUpperCase();
                const card = createCard(purity, prices[key]);
                grid.appendChild(card);
            });
        }
        
        // Real API integration (GoldAPI.io - free tier available)
        async function fetchPrices() {
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            
            try {
                // Replace YOUR_API_KEY with real key from https://www.goldapi.io/
                // Example: https://www.goldapi.io/api/XAU/INR
                
                // For demo, we'll use current data
                // In production:
                /*
                const response = await fetch('https://www.goldapi.io/api/XAU/INR', {
                    headers: {
                        'x-access-token': 'YOUR_API_KEY_HERE'
                    }
                });
                const data = await response.json();
                
                // Update prices (GoldAPI gives gram prices directly)
                prices["24k"].price = Math.round(data.price_gram_24k || 15093);
                // Similarly for others
                */
                
                // Simulate API delay
                await new Promise(resolve => setTimeout(resolve, 800));
                
                renderPrices();
                document.getElementById('last-updated').textContent = 
                    `Last updated: ${new Date().toLocaleTimeString('en-IN')}`;
                
            } catch (error) {
                console.error('Error fetching prices:', error);
                alert('Could not fetch live prices. Using cached data.');
                renderPrices();
            } finally {
                loader.style.display = 'none';
            }
        }
        
        // Initialize
        window.onload = () => {
            renderPrices();
            
            // Auto refresh every 60 seconds
            setInterval(() => {
                fetchPrices();
            }, 60000);
        };
    </script>
</body>
</html>
